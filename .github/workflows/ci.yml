name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: claimflow
          POSTGRES_USER: claimflowdev
          POSTGRES_PASSWORD: claimflowdev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U claimflowdev -d claimflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prepare Test Environment
        run: |
          cp .env.example .env
          sed -i 's#^DATABASE_URL=.*#DATABASE_URL="postgresql://claimflowdev:claimflowdev@127.0.0.1:5432/claimflow?schema=public"#' .env

      - name: Apply Database Migrations
        run: pnpm db:migrate:deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
